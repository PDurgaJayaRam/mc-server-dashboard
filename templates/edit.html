{% extends "base.html" %}

{% block content %}
<div class="mb-4 flex flex-col md:flex-row justify-between items-center gap-4">
    <div>
        <h1 class="text-2xl font-bold text-white mb-1"><i class="fa-solid fa-pen-to-square mr-2"></i> File Editor</h1>
        <p class="text-sm text-gray-400 font-mono">{{ path }}</p>
    </div>
    <div class="flex gap-2">
        <a href="{{ url_for('list_files') }}" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm">
            Cancel
        </a>
        <button type="submit" form="editor-form" class="bg-mcgreen hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium transition text-sm shadow-lg">
            <i class="fa-solid fa-floppy-disk mr-2"></i> Save File
        </button>
    </div>
</div>

<div class="glass-panel rounded-xl border border-gray-700 h-[70vh] flex flex-col relative w-full overflow-hidden">
    <!-- Super basic editor. In a full scale app using monaco/ace editor would be preferred -->
    <form id="editor-form" method="POST" action="{{ url_for('edit_file', path=path) }}" class="flex-1 flex flex-col">
        <textarea name="content" class="flex-1 w-full bg-transparent text-gray-200 p-4 font-mono text-sm focus:outline-none resize-none leading-relaxed" spellcheck="false">{{ content }}</textarea>
    </form>
</div>
{% endblock %}
