{% extends "base.html" %}

{% block login %}
<div class="glass-panel w-full max-w-md p-8 rounded-xl shadow-2xl relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-mcgreen rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
    
    <div class="text-center mb-8 relative z-10">
        <div class="w-16 h-16 bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-gray-700 shadow-inner">
            <i class="fa-solid fa-cube text-3xl text-mcgreen"></i>
        </div>
        <h2 class="text-3xl font-bold text-white tracking-tight">Access Panel</h2>
        <p class="text-gray-400 mt-2 text-sm">Enter the dashboard password or your local user credentials to continue.</p>
    </div>

    {% if error %}
    <div class="bg-red-500/10 border border-red-500/50 text-red-500 px-4 py-3 rounded mb-6 text-sm text-center">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" class="space-y-5 relative z-10">
        <!-- Dashboard generic or username -->
        <div>
            <label class="block text-gray-400 text-xs font-semibold mb-2 uppercase tracking-wider" for="username">
                Username <span class="text-gray-600 font-normal lowercase tracking-normal">(Optional for Admin)</span>
            </label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-user text-gray-500"></i>
                </div>
                <input class="w-full bg-gray-900/50 border border-gray-700 text-white rounded-lg focus:ring-2 focus:ring-mcgreen focus:border-transparent block pl-10 p-2.5 transition" 
                       id="username" name="username" type="text" placeholder="Djrockzz">
            </div>
        </div>

        <div>
            <label class="block text-gray-400 text-xs font-semibold mb-2 uppercase tracking-wider" for="password">
                Password
            </label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-lock text-gray-500"></i>
                </div>
                <input class="w-full bg-gray-900/50 border border-gray-700 text-white rounded-lg focus:ring-2 focus:ring-mcgreen focus:border-transparent block pl-10 p-2.5 transition" 
                       id="password" name="password" type="password" placeholder="••••••••" required>
            </div>
        </div>

        <button class="w-full bg-mcgreen hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition duration-200 transform hover:-translate-y-0.5 mt-4 flex justify-center items-center" type="submit">
            <i class="fa-solid fa-right-to-bracket mr-2"></i> Authenticate
        </button>
    </form>
    
    <div class="mt-8 text-center text-xs text-gray-600 relative z-10">
        ClawCloud Run Server Management
    </div>
</div>
{% endblock %}
